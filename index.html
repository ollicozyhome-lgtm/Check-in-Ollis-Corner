<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Online Check-in | Olli's Corner Firenze</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #7c5cbf;
            --primary-dark: #5a3d99;
            --primary-light: #f0ecfa;
            --text-main: #1e1b2e;
            --text-muted: #7a7490;
            --bg: #f7f5fc;
            --white: #ffffff;
            --border: #ede8f7;
            --input-bg: #fbfafc;
            --success: #28a745;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background-color: var(--bg);
            max-width: 750px;
            width: 100%;
            border-radius: 16px;
        }

        /* ── HEADER ── */
        .header {
            position: relative;
            background-image: url('https://raw.githubusercontent.com/ollicozyhome-lgtm/Check-in-Ollis-Corner/main/banner-checkin.jpg');
            background-size: cover;
            background-position: center;
            height: 220px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 8px 24px rgba(92, 61, 153, 0.15);
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 25px;
        }

        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(30, 27, 46, 0.8) 0%, rgba(30, 27, 46, 0) 60%);
        }

        .header-text {
            position: relative;
            color: white;
            z-index: 1;
            text-shadow: 0px 2px 8px rgba(0,0,0,0.8);
        }

        .header-title {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 4px 0;
            letter-spacing: 0.5px;
        }

        .header-subtitle {
            font-size: 14px;
            opacity: 1;
            margin: 0;
            font-weight: 500;
            color: #f0ecfa;
        }

        /* ── CARD SEZIONI ── */
        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(92, 61, 153, 0.05);
        }

        .section-title {
            color: var(--primary-dark);
            font-size: 18px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--primary-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary);
            font-size: 20px;
        }

        .sub-section-title {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            margin: 25px 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── INPUT E FORM ── */
        .form-group { margin-bottom: 18px; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-main);
            transition: all 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background-color: var(--white);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        input[type="file"] {
            padding: 10px;
            background-color: var(--white);
            border: 1.5px dashed var(--primary);
            color: var(--text-muted);
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background-color: var(--primary-light);
            color: var(--primary-dark);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            margin-right: 15px;
            transition: background 0.2s;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .guest-section { display: none; }
        #section-guest-1 { display: block; }

        /* ── BOTTONE ── */
        .submit-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(92, 61, 153, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }
        
        .submit-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(92, 61, 153, 0.35); }
        .submit-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

        /* ── MESSAGGIO DI SUCCESSO ── */
        #success-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(92, 61, 153, 0.05);
            border: 1px solid var(--border);
        }

        #success-message i { font-size: 60px; color: var(--success); margin-bottom: 20px; }
        #success-message h2 { color: var(--primary-dark); margin: 0 0 10px 0; }
        #success-message p { color: var(--text-muted); line-height: 1.5; }

        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; gap: 0; }
            .header { height: 180px; padding: 20px; }
            .header-title { font-size: 24px; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <div class="header-text">
            <h1 class="header-title">Olli's Corner Firenze</h1>
            <p class="header-subtitle" data-i18n="subtitle">Online Registration</p>
        </div>
    </div>

    <div id="success-message">
        <i class="fa-solid fa-circle-check"></i>
        <h2 data-i18n="successTitle">Check-in Complete!</h2>
        <p data-i18n="successDesc">Thank you for registering. We look forward to hosting you in Florence.</p>
    </div>

    <form id="checkinForm">
        <input type="hidden" id="portalSource" value="Booking">

        <div class="card">
            <div class="section-title"><i class="fa-solid fa-calendar-check"></i> <span data-i18n="stayDetailsTitle">Stay Details</span></div>
            <div class="grid-2">
                <div class="form-group">
                    <label data-i18n="arrivalDate">Arrival Date</label>
                    <input type="date" id="arrivalDate" class="req-field" required>
                </div>
                <div class="form-group">
                    <label data-i18n="numberOfNights">Number of Nights</label>
                    <input type="number" id="numberOfNights" value="1" min="1" class="req-field" required>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label data-i18n="totalGuestsLabel">Total number of guests?</label>
                <select id="totalGuests" onchange="aggiornaOspiti()">
                    <option value="1" data-i18n="guest1Opt">1 Guest</option>
                    <option value="2" data-i18n="guest2Opt">2 Guests</option>
                    <option value="3" data-i18n="guest3Opt">3 Guests</option>
                    <option value="4" data-i18n="guest4Opt">4 Guests</option>
                </select>
            </div>
        </div>

        <div id="ospiti-container">
            <div id="section-guest-1" class="card guest-section">
                <div class="section-title"><i class="fa-solid fa-user-check"></i> <span data-i18n="guest1Title">Guest 1</span> <span style="font-size: 13px; color: var(--text-muted); margin-left: 8px; font-weight: 500;" data-i18n="mainGuest">(Main Guest)</span></div>
                
                <div class="sub-section-title"><i class="fa-solid fa-address-card"></i> <span data-i18n="personalInfo">Personal Info</span></div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="firstName">First Name</label><input type="text" id="g1_firstName" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="lastName">Last Name</label><input type="text" id="g1_lastName" class="req-field" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="gender">Gender</label><select id="g1_gender" class="req-field" required><option value="M" data-i18n="genderM">M</option><option value="F" data-i18n="genderF">F</option><option value="X" data-i18n="genderX">X (Other)</option></select></div>
                    <div class="form-group"><label data-i18n="dob">Date of Birth</label><input type="date" id="g1_dob" class="req-field" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="nationality">Nationality</label><input type="text" id="g1_cit" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="pob">Town/City of Birth</label><input type="text" id="g1_pob" class="req-field" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="resCountry">Country of Residence</label><input type="text" id="g1_resState" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="resCity">City of Residence</label><input type="text" id="g1_resCity" class="req-field" required></div>
                </div>

                <div class="sub-section-title"><i class="fa-solid fa-passport"></i> <span data-i18n="idDocument">ID Document</span></div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="docType">Doc. Type</label><select id="g1_docT" class="req-field" required><option value="ID CARD" data-i18n="docTypeIdCard">National ID Card</option><option value="PASSPORT" data-i18n="docTypePassport">Passport</option></select></div>
                    <div class="form-group"><label data-i18n="docNumber">Doc. Number</label><input type="text" id="g1_docN" class="req-field" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="issuingCountry">Issuing Country</label><input type="text" id="g1_docState" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="issuingCity">Issuing Authority/Office</label><input type="text" id="g1_docCity" class="req-field" required></div>
                </div>
                <div class="form-group" style="margin-bottom: 0;"><label data-i18n="uploadPhoto">Upload ID Photo (Front/Back)</label><input type="file" id="g1_photo" accept="image/*,application/pdf" class="req-field" required></div>
            </div>

            <div id="section-guest-2" class="card guest-section">
                <div class="section-title"><i class="fa-solid fa-user"></i> <span data-i18n="guest2Title">Guest 2</span></div>
                <div class="sub-section-title"><i class="fa-solid fa-address-card"></i> <span data-i18n="personalInfo">Personal Info</span></div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="firstName">First Name</label><input type="text" id="g2_firstName" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="lastName">Last Name</label><input type="text" id="g2_lastName" class="req-field" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="gender">Gender</label><select id="g2_gender" class="req-field" required><option value="M" data-i18n="genderM">M</option><option value="F" data-i18n="genderF">F</option><option value="X" data-i18n="genderX">X (Other)</option></select></div>
                    <div class="form-group"><label data-i18n="dob">Date of Birth</label><input type="date" id="g2_dob" class="req-field" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="nationality">Nationality</label><input type="text" id="g2_cit" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="pob">Town/City of Birth</label><input type="text" id="g2_pob" class="req-field" required></div>
                </div>
                <div class="grid-2" style="margin-bottom: 0;">
                    <div class="form-group"><label data-i18n="resCountry">Country of Residence</label><input type="text" id="g2_resState" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="resCity">City of Residence</label><input type="text" id="g2_resCity" class="req-field" required></div>
                </div>
            </div>

            <div id="section-guest-3" class="card guest-section">
                <div class="section-title"><i class="fa-solid fa-user"></i> <span data-i18n="guest3Title">Guest 3</span></div>
                <div class="sub-section-title"><i class="fa-solid fa-address-card"></i> <span data-i18n="personalInfo">Personal Info</span></div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="firstName">First Name</label><input type="text" id="g3_firstName" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="lastName">Last Name</label><input type="text" id="g3_lastName" class="req-field" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="gender">Gender</label><select id="g3_gender" class="req-field" required><option value="M" data-i18n="genderM">M</option><option value="F" data-i18n="genderF">F</option><option value="X" data-i18n="genderX">X (Other)</option></select></div>
                    <div class="form-group"><label data-i18n="dob">Date of Birth</label><input type="date" id="g3_dob" class="req-field" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="nationality">Nationality</label><input type="text" id="g3_cit" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="pob">Town/City of Birth</label><input type="text" id="g3_pob" class="req-field" required></div>
                </div>
                <div class="grid-2" style="margin-bottom: 0;">
                    <div class="form-group"><label data-i18n="resCountry">Country of Residence</label><input type="text" id="g3_resState" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="resCity">City of Residence</label><input type="text" id="g3_resCity" class="req-field" required></div>
                </div>
            </div>

            <div id="section-guest-4" class="card guest-section">
                <div class="section-title"><i class="fa-solid fa-user"></i> <span data-i18n="guest4Title">Guest 4</span></div>
                <div class="sub-section-title"><i class="fa-solid fa-address-card"></i> <span data-i18n="personalInfo">Personal Info</span></div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="firstName">First Name</label><input type="text" id="g4_firstName" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="lastName">Last Name</label><input type="text" id="g4_lastName" class="req-field" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="gender">Gender</label><select id="g4_gender" class="req-field" required><option value="M" data-i18n="genderM">M</option><option value="F" data-i18n="genderF">F</option><option value="X" data-i18n="genderX">X (Other)</option></select></div>
                    <div class="form-group"><label data-i18n="dob">Date of Birth</label><input type="date" id="g4_dob" class="req-field" required></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label data-i18n="nationality">Nationality</label><input type="text" id="g4_cit" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="pob">Town/City of Birth</label><input type="text" id="g4_pob" class="req-field" required></div>
                </div>
                <div class="grid-2" style="margin-bottom: 0;">
                    <div class="form-group"><label data-i18n="resCountry">Country of Residence</label><input type="text" id="g4_resState" class="req-field" required></div>
                    <div class="form-group"><label data-i18n="resCity">City of Residence</label><input type="text" id="g4_resCity" class="req-field" required></div>
                </div>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn"><i class="fa-solid fa-paper-plane"></i> <span data-i18n="submitBtn">Submit Registration</span></button>
    </form>
</div>

<script>
    // ==========================================
    // 🌐 DIZIONARIO MULTILINGUA (i18n)
    // ==========================================
    const i18n = {
        en: {
            subtitle: "Online Registration",
            stayDetailsTitle: "Stay Details",
            arrivalDate: "Arrival Date",
            numberOfNights: "Number of Nights",
            totalGuestsLabel: "Total number of guests?",
            guest1Opt: "1 Guest",
            guest2Opt: "2 Guests",
            guest3Opt: "3 Guests",
            guest4Opt: "4 Guests",
            guest1Title: "Guest 1",
            guest2Title: "Guest 2",
            guest3Title: "Guest 3",
            guest4Title: "Guest 4",
            mainGuest: "(Main Guest)",
            personalInfo: "Personal Info",
            firstName: "First Name",
            lastName: "Last Name",
            gender: "Gender",
            genderM: "M",
            genderF: "F",
            genderX: "X (Other)",
            dob: "Date of Birth",
            nationality: "Nationality",
            pob: "Town/City of Birth",
            resCountry: "Country of Residence",
            resCity: "City of Residence",
            idDocument: "ID Document",
            docType: "Document Type",
            docTypeIdCard: "National ID Card",
            docTypePassport: "Passport",
            docNumber: "Document Number",
            issuingCountry: "Issuing Country",
            issuingCity: "Issuing Authority/Office",
            uploadPhoto: "Upload ID Photo (Front/Back)",
            submitBtn: "Submit Registration",
            placeholderFirstName: "e.g. John",
            placeholderLastName: "e.g. Doe",
            placeholderCit: "e.g. United Kingdom",
            placeholderPob: "e.g. London",
            placeholderResCountry: "e.g. United Kingdom",
            placeholderResCity: "e.g. Manchester",
            placeholderDocState: "e.g. United Kingdom",
            placeholderDocCity: "e.g. HM Passport Office",
            btnSending: "Sending... please wait",
            successTitle: "Check-in Complete!",
            successDesc: "Thank you for registering. We look forward to hosting you in Florence."
        },
        it: {
            subtitle: "Registrazione Ospiti",
            stayDetailsTitle: "Dettagli Soggiorno",
            arrivalDate: "Data di Arrivo",
            numberOfNights: "Numero Notti",
            totalGuestsLabel: "Numero totale di ospiti?",
            guest1Opt: "1 Ospite",
            guest2Opt: "2 Ospiti",
            guest3Opt: "3 Ospiti",
            guest4Opt: "4 Ospiti",
            guest1Title: "Ospite 1",
            guest2Title: "Ospite 2",
            guest3Title: "Ospite 3",
            guest4Title: "Ospite 4",
            mainGuest: "(Capogruppo)",
            personalInfo: "Dati Personali",
            firstName: "Nome",
            lastName: "Cognome",
            gender: "Sesso",
            genderM: "M",
            genderF: "F",
            genderX: "X (Altro)",
            dob: "Data di Nascita",
            nationality: "Cittadinanza",
            pob: "Luogo di Nascita (Comune/Stato)",
            resCountry: "Nazione di Residenza",
            resCity: "Comune di Residenza",
            idDocument: "Documento di Identità",
            docType: "Tipo Documento",
            docTypeIdCard: "Carta d'Identità",
            docTypePassport: "Passaporto",
            docNumber: "Numero Documento",
            issuingCountry: "Stato di Rilascio",
            issuingCity: "Comune/Autorità di Rilascio",
            uploadPhoto: "Carica Foto Documento (Fronte/Retro)",
            submitBtn: "Invia Registrazione",
            placeholderFirstName: "es. Mario",
            placeholderLastName: "es. Rossi",
            placeholderCit: "es. Italiana",
            placeholderPob: "es. Roma",
            placeholderResCountry: "es. Italia",
            placeholderResCity: "es. Milano",
            placeholderDocState: "es. Italia",
            placeholderDocCity: "es. Comune di Roma",
            btnSending: "Invio in corso...",
            successTitle: "Check-in Completato!",
            successDesc: "Grazie per esserti registrato. Non vediamo l'ora di ospitarti a Firenze."
        }
    };

    let currentLang = 'en';

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('portalSource').value = (urlParams.get('p') === 'airbnb') ? 'Airbnb' : 'Booking';
        
        const browserLang = navigator.language || navigator.userLanguage;
        if (browserLang.toLowerCase().startsWith('it')) { currentLang = 'it'; }
        
        applyTranslations();
        aggiornaOspiti();
    };

    function applyTranslations() {
        const langData = i18n[currentLang];
        document.querySelectorAll('[data-i18n]').forEach(element => {
            const key = element.getAttribute('data-i18n');
            if (langData[key]) { element.innerText = langData[key]; }
        });

        for(let i=1; i<=4; i++) {
            if(document.getElementById(`g${i}_firstName`)) document.getElementById(`g${i}_firstName`).placeholder = langData.placeholderFirstName;
            if(document.getElementById(`g${i}_lastName`)) document.getElementById(`g${i}_lastName`).placeholder = langData.placeholderLastName;
            if(document.getElementById(`g${i}_cit`)) document.getElementById(`g${i}_cit`).placeholder = langData.placeholderCit;
            if(document.getElementById(`g${i}_pob`)) document.getElementById(`g${i}_pob`).placeholder = langData.placeholderPob;
            if(document.getElementById(`g${i}_resState`)) document.getElementById(`g${i}_resState`).placeholder = langData.placeholderResCountry;
            if(document.getElementById(`g${i}_resCity`)) document.getElementById(`g${i}_resCity`).placeholder = langData.placeholderResCity;
            if(document.getElementById(`g${i}_docState`)) document.getElementById(`g${i}_docState`).placeholder = langData.placeholderDocState;
            if(document.getElementById(`g${i}_docCity`)) document.getElementById(`g${i}_docCity`).placeholder = langData.placeholderDocCity;
        }
    }

    function aggiornaOspiti() {
        const numero = parseInt(document.getElementById('totalGuests').value);
        for (let i = 1; i <= 4; i++) {
            const section = document.getElementById('section-guest-' + i);
            const inputs = section.querySelectorAll('.req-field');
            if (i <= numero) {
                section.style.display = 'block';
                inputs.forEach(input => input.setAttribute('required', 'true'));
            } else {
                section.style.display = 'none';
                inputs.forEach(input => input.removeAttribute('required'));
            }
        }
    }

    function getBase64(file) {
        return new Promise((resolve, reject) => {
            if (!file) { resolve(null); return; }
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve({
                name: file.name,
                mimeType: file.type,
                base64: reader.result.split(',')[1]
            });
            reader.onerror = error => reject(error);
        });
    }

    document.getElementById('checkinForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const langData = i18n[currentLang];
        
        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span style="margin-left:8px;">${langData.btnSending}</span>`;
        btn.disabled = true;

        try {
            const numOspiti = parseInt(document.getElementById('totalGuests').value);
            let payload = {
                portale: document.getElementById('portalSource').value,
                arrivalDate: document.getElementById('arrivalDate').value,
                notti: document.getElementById('numberOfNights').value,
                totaleOspiti: numOspiti,
                ospiti: []
            };

            for(let i = 1; i <= numOspiti; i++) {
                let fileInput = document.getElementById('g' + i + '_photo');
                let fileData = fileInput && fileInput.files[0] ? await getBase64(fileInput.files[0]) : null;
                
                // Costruisce la riga in modo che passi valori vuoti per i documenti degli ospiti 2,3,4 senza rompere Excel
                payload.ospiti.push({
                    nome: document.getElementById('g' + i + '_firstName').value,
                    cognome: document.getElementById('g' + i + '_lastName').value,
                    sesso: document.getElementById('g' + i + '_gender').value,
                    dataNas: document.getElementById('g' + i + '_dob').value,
                    cittadinanza: document.getElementById('g' + i + '_cit').value,
                    luogoNas: document.getElementById('g' + i + '_pob').value,
                    resStato: document.getElementById('g' + i + '_resState').value,
                    resComune: document.getElementById('g' + i + '_resCity').value,
                    tipoDoc: document.getElementById('g' + i + '_docT') ? document.getElementById('g' + i + '_docT').value : "",
                    numDoc: document.getElementById('g' + i + '_docN') ? document.getElementById('g' + i + '_docN').value : "",
                    docStato: document.getElementById('g' + i + '_docState') ? document.getElementById('g' + i + '_docState').value : "",
                    docComune: document.getElementById('g' + i + '_docCity') ? document.getElementById('g' + i + '_docCity').value : "",
                    foto: fileData
                });
            }

            // LINK ORIGINALE GOOGLE APPS SCRIPT
            const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbwRaKhhaV6CohXtrDJAxKm4DfmZ4F1KLajFyz_Slzc5axY8arSkj_rueQ4AmdzW1P4xJg/exec";

            let response = await fetch(GOOGLE_APP_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            let result = await response.json();
            
            if(result.status === "success") {
                document.getElementById('checkinForm').style.display = 'none';
                document.getElementById('success-message').style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                alert("Error: " + result.message);
                btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> <span style="margin-left:8px;">${langData.submitBtn}</span>`;
                btn.disabled = false;
            }
        } catch(error) {
            alert("Connection error. Try again.");
            btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> <span style="margin-left:8px;">${langData.submitBtn}</span>`;
            btn.disabled = false;
        }
    };
</script>
