<!DOCTYPE html>
<html lang="it">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --lilla:       #7c5cbf;
      --lilla-dark:  #5a3d99;
      --lilla-light: #f0ecfa;
      --lilla-mid:   #c4b3e8;
      --danger:      #e05252;
      --text:        #1e1b2e;
      --text-muted:  #7a7490;
      --bg:          #f7f5fc;
      --card:        #ffffff;
      --border:      #ede8f7;
      --nav-h:       72px;
      --radius:      16px;
      --radius-sm:   10px;

      --airbnb:      #ff5a5f;
      --airbnb-bg:   #fff5f5;
      --booking:     #003580;
      --booking-bg:  #f0f4ff;
      --privato:     #2d9e6b;
      --privato-bg:  #f0faf5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: calc(var(--nav-h) + 20px);
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--lilla-dark), var(--lilla));
      color: white; padding: 20px 20px 16px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(92,61,153,.25);
    }
    .header-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .header-logo { font-family: 'Playfair Display', serif; font-size: 22px; }
    .header-logo span { display: block; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 300; opacity: .7; margin-top: 2px; }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0; background: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 999; gap: 14px;
    }
    .loader-ring { width: 46px; height: 46px; border: 3px solid var(--lilla-light); border-top-color: var(--lilla); border-radius: 50%; animation: spin .85s linear infinite; }
    .loader-text { font-size: 14px; color: var(--text-muted); font-weight: 500; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LAYOUT ── */
    .container { max-width: 600px; margin: 0 auto; padding: 16px 14px; }
    .tab-content { display: none; animation: fadeUp .22s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── PILL TASSE ── */
    .pill-totale {
      background: linear-gradient(135deg, var(--lilla), var(--lilla-dark));
      color: white; border-radius: var(--radius);
      padding: 16px 20px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .pill-icon { font-size: 30px; opacity: .8; }
    .pill-label { font-size: 12px; opacity: .75; font-weight: 400; }
    .pill-value { font-size: 28px; font-weight: 700; line-height: 1; }

    /* ── CARD PRESENZA ── */
    .card {
      background: var(--card); border-radius: var(--radius);
      padding: 16px; margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(92,61,153,.07);
      border: 1px solid var(--border);
    }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .guest-name { font-size: 17px; font-weight: 700; color: var(--lilla-dark); flex: 1; padding-right: 8px; line-height: 1.25; }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
    .badge-airbnb  { background: var(--airbnb-bg);  color: var(--airbnb);  border: 1px solid #ff5a5f30; }
    .badge-booking { background: var(--booking-bg); color: var(--booking); border: 1px solid #00358030; }
    .badge-altro   { background: var(--lilla-light); color: var(--lilla-dark); border: 1px solid var(--lilla-mid); }

    .ospiti-box { background: var(--lilla-light); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13.5px; margin-bottom: 12px; line-height: 1.5; }
    .ospiti-box b { color: var(--lilla-dark); }
    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13.5px; }
    .detail-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
    .detail-item i { color: var(--lilla); width: 14px; text-align: center; flex-shrink: 0; }
    .detail-item.red { color: var(--danger); font-weight: 700; }
    .detail-item.red i { color: var(--danger); }

    .btn-doc {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--lilla); color: white; text-decoration: none;
      padding: 11px; border-radius: var(--radius-sm); margin-top: 14px;
      font-weight: 600; font-size: 13.5px;
    }

    /* ── CARD CALENDARIO ── */
    .cal-card {
      background: var(--card); border-radius: var(--radius);
      padding: 14px 14px 14px 18px; margin-bottom: 10px;
      display: flex; align-items: stretch; gap: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(92,61,153,.05);
      position: relative; overflow: hidden;
    }
    /* Barra sinistra colorata per portale */
    .cal-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    }
    .cal-card.type-airbnb::before  { background: var(--airbnb); }
    .cal-card.type-booking::before { background: var(--booking); }
    .cal-card.type-privato::before { background: var(--privato); }

    /* Colonna data */
    .cal-date { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 48px; flex-shrink: 0; }
    .cal-day   { font-size: 26px; font-weight: 700; line-height: 1; color: var(--text); }
    .cal-month { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }

    .cal-divider { width: 1px; background: var(--border); flex-shrink: 0; margin: 2px 0; }

    /* Corpo card calendario */
    .cal-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 5px; min-width: 0; }

    .cal-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
      width: fit-content;
    }
    .chip-airbnb  { background: var(--airbnb-bg);  color: var(--airbnb);  }
    .chip-booking { background: var(--booking-bg); color: var(--booking); }
    .chip-privato { background: var(--privato-bg); color: var(--privato); }

    .cal-title { font-size: 14.5px; font-weight: 700; line-height: 1.25; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .cal-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--text-muted); }
    .cal-footer span { display: flex; align-items: center; gap: 4px; }
    .cal-footer i { font-size: 10px; }
    .cal-footer .fi-airbnb  { color: var(--airbnb); }
    .cal-footer .fi-booking { color: var(--booking); }
    .cal-footer .fi-privato { color: var(--privato); }

    /* ── LEGENDA ── */
    .legenda {
      display: flex; gap: 14px; flex-wrap: wrap;
      margin-bottom: 14px; padding: 11px 14px;
      background: var(--card); border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .legenda-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .legenda-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-airbnb   { background: var(--airbnb); }
    .dot-booking  { background: var(--booking); }
    .dot-privato  { background: var(--privato); }

    /* ── MONTH SEP ── */
    .month-sep {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted);
      padding: 10px 2px 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .month-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── EMPTY / ERROR ── */
    .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty i { font-size: 36px; opacity: .3; display: block; margin-bottom: 12px; }
    .error-box { background: #fff0f0; border: 1px solid var(--danger); border-radius: var(--radius); padding: 18px; color: var(--danger); font-size: 14px; line-height: 1.6; }
    .error-box b { display: block; font-size: 15px; margin-bottom: 6px; }

    /* ── NAVBAR ── */
    .nav-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h); background: white;
      display: flex; border-top: 1px solid var(--border);
      box-shadow: 0 -4px 20px rgba(92,61,153,.08); z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      color: var(--text-muted); cursor: pointer; transition: color .2s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .nav-item i    { font-size: 20px; transition: transform .2s; }
    .nav-item span { font-size: 11.5px; font-weight: 600; }
    .nav-item.active { color: var(--lilla); }
    .nav-item.active i { transform: translateY(-2px); }
  </style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-text">Caricamento in corso…</div>
</div>

<header>
  <div class="header-inner">
    <div class="header-logo">
      Olli's Corner
      <span>Gestionale appartamento</span>
    </div>
    <i class="fa-solid fa-house-chimney" style="font-size:22px; opacity:.7;"></i>
  </div>
</header>

<div class="container">

  <div id="tab-presenze" class="tab-content active">
    <div class="pill-totale">
      <i class="fa-solid fa-piggy-bank pill-icon"></i>
      <div>
        <div class="pill-label">Tasse accumulate</div>
        <div class="pill-value" id="valTotale">—</div>
      </div>
    </div>
    <div id="listaPresenze"></div>
  </div>

  <div id="tab-calendario" class="tab-content">
    <div class="legenda">
      <div class="legenda-item"><div class="legenda-dot dot-airbnb"></div>Airbnb</div>
      <div class="legenda-item"><div class="legenda-dot dot-booking"></div>Booking.com</div>
      <div class="legenda-item"><div class="legenda-dot dot-privato"></div>Blocco privato</div>
    </div>
    <div id="listaCalendario"></div>
  </div>

</div>

<nav class="nav-bar">
  <div class="nav-item active" onclick="switchTab('tab-presenze', this)">
    <i class="fa-solid fa-user-group"></i>
    <span>Check-in</span>
  </div>
  <div class="nav-item" onclick="switchTab('tab-calendario', this)">
    <i class="fa-solid fa-calendar-alt"></i>
    <span>Calendario</span>
  </div>
</nav>

<script>
  var MESI_BREVI  = ["GEN","FEB","MAR","APR","MAG","GIU","LUG","AGO","SET","OTT","NOV","DIC"];
  var MESI_LUNGHI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

  function switchTab(tabId, el) {
    document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
    document.getElementById(tabId).classList.add('active');
    el.classList.add('active');
  }

  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function tipoPortale(portale) {
    var p = (portale || '').toLowerCase();
    if (p === 'airbnb')  return 'airbnb';
    if (p === 'booking') return 'booking';
    return 'privato';
  }

  /* ── PRESENZE ── */
  function renderPresenze(presenze) {
    var el = document.getElementById('listaPresenze');
    var totale = 0;

    if (!presenze || presenze.length === 0) {
      el.innerHTML = '<div class="empty"><i class="fa-solid fa-inbox"></i><p>Nessun check-in trovato.</p></div>';
      document.getElementById('valTotale').textContent = '€ 0,00';
      return;
    }

    var html = [];
    presenze.forEach(function(p) {
      totale += p.tassa || 0;
      var nomeCapo     = (p.nomiOspiti && p.nomiOspiti[0]) ? p.nomiOspiti[0] : 'Ospite';
      var elencoOspiti = (p.nomiOspiti && p.nomiOspiti.length > 0) ? p.nomiOspiti.join(', ') : 'N/D';
      var tipo = tipoPortale(p.portale);
      var bc   = tipo === 'airbnb' ? 'badge-airbnb' : tipo === 'booking' ? 'badge-booking' : 'badge-altro';

      html.push(
        '<div class="card">',
          '<div class="card-top">',
            '<div class="guest-name">' + esc(nomeCapo) + '</div>',
            '<span class="badge ' + bc + '">' + esc(p.portale) + '</span>',
          '</div>',
          '<div class="ospiti-box"><i class="fa-solid fa-users" style="color:var(--lilla);margin-right:6px;"></i><b>Ospiti:</b> ' + esc(elencoOspiti) + '</div>',
          '<div class="details-grid">',
            '<div class="detail-item"><i class="fa-solid fa-calendar-day"></i>' + esc(p.data) + '</div>',
            '<div class="detail-item"><i class="fa-solid fa-moon"></i>' + p.notti + ' notti</div>',
            '<div class="detail-item"><i class="fa-solid fa-user-plus"></i>' + p.ospitiConteggio + ' ospiti</div>',
            '<div class="detail-item red"><i class="fa-solid fa-coins"></i>€ ' + (p.tassa||0).toFixed(2) + '</div>',
          '</div>',
          p.linkDoc ? '<a href="' + esc(p.linkDoc) + '" target="_blank" class="btn-doc"><i class="fa-solid fa-id-card"></i> Documento capogruppo</a>' : '',
        '</div>'
      );
    });

    el.innerHTML = html.join('');
    document.getElementById('valTotale').textContent = '€ ' + totale.toFixed(2).replace('.', ',');
  }

  /* ── CALENDARIO ── */
  function renderCalendario(calendario) {
    var el = document.getElementById('listaCalendario');

    if (!calendario || calendario.length === 0) {
      el.innerHTML = '<div class="empty"><i class="fa-solid fa-calendar-xmark"></i><p>Nessuna prenotazione futura.</p></div>';
      return;
    }

    var html = [];
    var ultimoMese = null;

    calendario.forEach(function(c) {
      var parti   = (c.checkIn || '').split('/');
      var giorno  = parti[0] || '??';
      var mIdx    = parti[1] ? parseInt(parti[1]) - 1 : 0;
      var anno    = parti[2] || '';
      var chiave  = anno + '-' + mIdx;
      var tipo    = tipoPortale(c.portale);
      var isPriv  = tipo === 'privato';

      if (chiave !== ultimoMese) {
        html.push('<div class="month-sep">' + (MESI_LUNGHI[mIdx]||'') + ' ' + anno + '</div>');
        ultimoMese = chiave;
      }

      // Titolo: per prenotazioni portale mostra il nome se disponibile,
      // altrimenti "Prenotazione [Portale]". Per privati usa la descrizione.
      var titolo = esc(c.titolo || '');
      if (!isPriv) {
        var tUp = (c.titolo || '').toUpperCase().trim();
        if (tUp === '' || tUp === 'RESERVED' || tUp === 'PRENOTAZIONE') {
          titolo = 'Prenotazione ' + esc(c.portale);
        }
      }

      // Label e chip portale
      var portalLabel = isPriv ? 'Blocco privato' : esc(c.portale);
      var chipCls     = 'chip-' + tipo;

      // Icona portale
      var iconCls = isPriv ? 'fa-solid fa-lock' :
                    tipo === 'airbnb' ? 'fa-brands fa-airbnb' : 'fa-solid fa-hotel';

      // Colore icone footer
      var fiCls = 'fi-' + tipo;

      html.push(
        '<div class="cal-card type-' + tipo + '">',
          '<div class="cal-date">',
            '<div class="cal-day">'   + esc(giorno) + '</div>',
            '<div class="cal-month">' + (MESI_BREVI[mIdx]||'') + '</div>',
          '</div>',
          '<div class="cal-divider"></div>',
          '<div class="cal-body">',
            '<span class="cal-chip ' + chipCls + '"><i class="' + iconCls + '"></i>' + portalLabel + '</span>',
            '<div class="cal-title">' + titolo + '</div>',
            '<div class="cal-footer">',
              '<span><i class="fa-solid fa-moon ' + fiCls + '"></i>' + (c.notti||0) + ' notti</span>',
              '<span><i class="fa-solid fa-right-from-bracket ' + fiCls + '"></i>Check-out: ' + esc(c.checkOut) + '</span>',
            '</div>',
          '</div>',
        '</div>'
      );
    });

    el.innerHTML = html.join('');
  }

  /* ── AVVIO ── */
  window.onload = function() {
    google.script.run
      .withSuccessHandler(function(data) {
        document.getElementById('loading').style.display = 'none';
        if (data.errore) {
          var msg = '<div class="error-box"><b>⚠️ Errore di sistema</b>' + esc(data.errore) + '</div>';
          document.getElementById('listaPresenze').innerHTML   = msg;
          document.getElementById('listaCalendario').innerHTML = msg;
          return;
        }
        renderPresenze(data.presenze);
        renderCalendario(data.calendario);
      })
      .withFailureHandler(function(err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('listaPresenze').innerHTML =
          '<div class="error-box"><b>⚠️ Errore di connessione</b>' + esc(err.message) + '</div>';
      })
      .getAppData();
  };
</script>

</body>
</html>
